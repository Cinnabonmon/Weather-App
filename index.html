<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <title>Frontend Mentor | Weather app</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Feel free to remove these styles or customize in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <!-- Top bar with logo and unit selection -->
    <div class="topbar">
      <img id="logo" src="./assets/images/logo.svg" alt="Weather App logo" />
      <!-- Selection of units -->
      <div class="unit-select">
        <div class="unit-selected">
          <img src="./assets/images/icon-units.svg" alt="Settings Icon" />
          <p>Metric</p>
          <div class="unit-options">
            <ul>
              <li>Metric</li>
              <li>Imperial</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    <!-- Main content -->
    <!-- Main Title -->
    <div class="title">
      <h1>How's the sky looking today?</h1>
    </div>
    <!-- Search bar -->
    <div class="search">
      <div class="search-box">
        <img src="./assets/images/icon-search.svg" alt="Search Icon" />
        <input type="text" placeholder="Search for a city..." />
      </div>
      <button>Search</button>
    </div>
    <!-- Weather information -->
    <!-- Weather temperature -->
    <div class="weather-box">
      <div class="main-weather">
        <img
          src="./assets/images/bg-today-large.svg"
          alt="Today's weather background"
          id="weather-bg"
        />
        <div class="weather-location">
          <h4 id="location">Miami</h4>
          <p id="date">4/28/2026</p>
        </div>
        <div class="weather-temp">
          <img id="current-icon" src="./assets/images/icon-rain.webp" alt="Rain" />
          <h1 id="temp">20°</h1>
        </div>
      </div>
      <!-- Weather details -->
      <div class="weather-details-box">
        <div class="feels-like">
          <p id="feels-like"></p>
          <p id="feels-like-detail"></p>
        </div>
        <div class="humidity">
          <p id="humidity"></p>
          <p id="humidity-detail"></p>
        </div>
        <div class="wind">
          <p id="wind"></p>
          <p id="wind-detail"></p>
        </div>
        <div class="precipitation">
          <p id="precipitation"></p>
          <p id="precipitation-detail"></p>
        </div>
      </div>
      <!-- Daily forecast -->
      <div class="daily-forecast">
        <div class="daily-forecast-box">
          <p class="day"></p>
          <img src="" alt="" class="weather-icon" />
          <div class="high-low">
            <p class="high"></p>
            <p class="low"></p>
          </div>
        </div>
        <div class="daily-forecast-box">
          <p class="day"></p>
          <img src="" alt="" class="weather-icon" />
          <div class="high-low">
            <p class="high"></p>
            <p class="low"></p>
          </div>
        </div>
        <div class="daily-forecast-box">
          <p class="day"></p>
          <img src="" alt="" class="weather-icon" />
          <div class="high-low">
            <p class="high"></p>
            <p class="low"></p>
          </div>
        </div>
        <div class="daily-forecast-box">
          <p class="day"></p>
          <img src="" alt="" class="weather-icon" />
          <div class="high-low">
            <p class="high"></p>
            <p class="low"></p>
          </div>
        </div>
        <div class="daily-forecast-box">
          <p class="day"></p>
          <img src="" alt="" class="weather-icon" />
          <div class="high-low">
            <p class="high"></p>
            <p class="low"></p>
          </div>
        </div>
        <div class="daily-forecast-box">
          <p class="day"></p>
          <img src="" alt="" class="weather-icon" />
          <div class="high-low">
            <p class="high"></p>
            <p class="low"></p>
          </div>
        </div>
        <div class="daily-forecast-box">
          <p class="day"></p>
          <img src="" alt="" class="weather-icon" />
          <div class="high-low">
            <p class="high"></p>
            <p class="low"></p>
          </div>
        </div>
      </div>
      <!-- Hourly forecast -->
      <div class="hourly-forecast">
        <div class="hourly-title-bar">
          <p>Hourly Forecast</p>
          <div class="day-select">
            <div class="hourly-day-selected">
              <p id="hourly-day"></p>
              <img src="./assets/images/icon-dropdown.svg" alt="" />
              <div class="hourly-options" hidden>
                <ul>
                  <li>Monday</li>
                  <li>Tuesday</li>
                  <li>Wednesday</li>
                  <li>Thursday</li>
                  <li>Friday</li>
                  <li>Saturday</li>
                  <li>Sunday</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Units Switch to Imperial/Metric Temperature Celsius (°C) Fahrenheit (°F) Wind Speed km/h mph
    Precipitation Millimeters (mm) Inches (in) How's the sky looking today? Search for a city, e.g., -->
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. Coded by
      <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
